<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar"></div>
<script>
  fetch("header.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("navbar").innerHTML = html;

      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinks");

      hamburger.addEventListener("click", () => {
        const isOpen = navLinks.style.display === "flex";
        navLinks.style.display = isOpen ? "none" : "flex";
        hamburger.style.display = isOpen ? "block" : "none";
      });
    });
</script>

<div class="register-container">

  <!-- Sacred Heart Emblem -->
  <div class="emblem-wrapper">
    <img src="images/sacredHeartSmall.jpg" alt="Sacred Heart" class="sacred-heart-emblem">
  </div>

  <h2>Register for Confirmation</h2>

  <form id="registerForm" class="two-column-form">

    <div class="form-left">
      <label>First Name</label>
      <input type="text" id="firstName" required>

      <label>Last Name</label>
      <input type="text" id="lastName" required>

      <label>Phone</label>
      <input type="text" id="phone">
    </div>

    <div class="form-right">
      <label>Email</label>
      <input type="email" id="email" required>

      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" required>
        <span id="togglePassword" class="toggle-password">Show</span>
      </div>
    </div>

    <button type="submit" class="register-btn">Register</button>

  </form>

  <p class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </p>

  <p id="message"></p>
</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script src="js/registerconfirm.js"></script>

<script>
  const togglePassword = document.getElementById("togglePassword");
  const passwordField = document.getElementById("password");

  togglePassword.addEventListener("click", () => {
    const isHidden = passwordField.type === "password";
    passwordField.type = isHidden ? "text" : "password";
    togglePassword.textContent = isHidden ? "Hide" : "Show";
  });
</script>


</body>
</html>
