<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sacred Heart Parish — Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="admin-header">
    <img src="images/sacred-heart.jpg" class="header-image" alt="Sacred Heart">
    <div class="header-overlay">
      <button id="menu-btn" class="hamburger">☰</button>
      <h1>Sacred Heart Parish — Admin Panel</h1>
      <span id="admin-email" class="admin-email"></span>
    </div>
  </header>

  <!-- COLLAPSIBLE SIDEBAR -->
  <nav id="sidebar" class="sidebar">
    <button id="close-sidebar" class="close-btn">×</button>

    <a href="#announcements">Announcements</a>
    <a href="#affairs">Current Affairs</a>
    <a href="#presentations">Presentations</a>
    <a href="#homepage-images">Homepage Images</a>
    <a href="#user-uploads">User Uploads</a>
    <a id="logout-btn">Logout</a>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- ANNOUNCEMENTS -->
    <section id="announcements" class="card">
      <h2>Announcements</h2>

      <form id="announcement-form">
        <textarea id="announcement-text" placeholder="Write announcement..."></textarea>
        <button type="submit">Add Announcement</button>
      </form>

      <div id="announcement-list"></div>
    </section>

    <!-- CURRENT AFFAIRS -->
    <section id="affairs" class="card">
      <h2>Current Affairs</h2>

      <form id="affair-form">
        <textarea id="affair-text" placeholder="Write update..."></textarea>
        <button type="submit">Add Update</button>
      </form>

      <div id="affair-list"></div>
    </section>

    <!-- PRESENTATIONS -->
    <section id="presentations" class="card">
      <h2>Presentations</h2>

      <form id="presentation-form">
        <input type="text" id="presentation-title" placeholder="Presentation title">
        <input type="file" id="presentation-file">
        <button type="submit">Upload Presentation</button>
      </form>

      <div id="presentation-list"></div>
    </section>

    <!-- HOMEPAGE IMAGES -->
    <section id="homepage-images" class="card">
      <h2>Homepage Images</h2>

      <form id="homepage-image-form">
        <input type="file" id="homepage-image-file">
        <button type="submit">Upload Image</button>
      </form>

      <div id="homepage-image-list"></div>
    </section>

    <!-- USER UPLOADS -->
    <section id="user-uploads" class="card">
      <h2>User Uploads</h2>
      <div id="user-upload-list"></div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
