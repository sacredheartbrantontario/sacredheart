<!DOCTYPE html>
<html>
<head>
  <title>Admin – Homepage Manager</title>
</head>
<body>


<!-- ADMIN AUTH CHECK -->
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "../login.html";
    return;
  }

  if (user.user_metadata.role !== "admin") {
    alert("You do not have admin access.");
    window.location.href = "../index.html";
    return;
  }
});
</script>

<!-- ADMIN HEADER -->
<div id="admin-header"></div>
<script>
  fetch("admin_header.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("admin-header").innerHTML = html;

      const logoutBtn = document.getElementById("logoutBtn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", async () => {
          await supabase.auth.signOut();
          window.location.href = "../login.html";
        });
      }
    });
</script>

<h1>Homepage Manager</h1>

<!-- BANNER -->
<h2>Banner</h2>
<form id="bannerForm">
  <input type="file" id="bannerImage" accept="image/*" required>
  <button type="submit">Upload Banner</button>
</form>
<div id="bannerPreview"></div>

<hr>

<!-- PHOTOS -->
<h2>Homepage Photos</h2>
<form id="photosForm">
  <input type="file" id="photoFile" accept="image/*" required>
  <button type="submit">Add Photo</button>
</form>
<div id="photosList"></div>

<hr>

<!-- LINKS -->
<h2>Homepage Links</h2>
<form id="linksForm">
  <input type="text" id="linkTitle" placeholder="Title" required>
  <input type="text" id="linkUrl" placeholder="URL" required>
  <button type="submit">Add Link</button>
</form>
<div id="linksList"></div>

<hr>

<!-- ANNOUNCEMENTS -->
<h2>Announcements</h2>
<form id="announcementForm">
  <input type="text" id="announcementTitle" placeholder="Title" required>
  <textarea id="announcementText" placeholder="Announcement text" required></textarea>
  <input type="file" id="announcementImage" accept="image/*">
  <button type="submit">Add Announcement</button>
</form>
<div id="announcementList"></div>


<!-- LOAD SUPABASE FIRST (CRITICAL) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase.js"></script>

<!-- LOAD ADMIN LOGIC LAST -->
 
<script src="../js/admin_homepage.js"></script>

</body>
</html>
