<style>
  .admin-nav {
    background: #800000;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
  }

  .admin-logo {
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
  }

  .admin-nav-right a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    margin-left: 20px;
  }

  .admin-nav-right a:hover {
    text-decoration: underline;
  }

  .admin-hamburger {
    display: none;
    font-size: 28px;
    cursor: pointer;
    color: white;
  }

  .admin-mobile-menu {
    display: none;
    flex-direction: column;
    background: #800000;
    padding: 10px 20px;
  }

  .admin-mobile-menu a {
    color: white;
    padding: 10px 0;
    text-decoration: none;
    font-weight: bold;
  }

  .admin-mobile-menu a:hover {
    text-decoration: underline;
  }

  @media (max-width: 768px) {
    .admin-nav-right {
      display: none;
    }

    .admin-hamburger {
      display: block;
    }

    .admin-mobile-menu.open {
      display: flex;
    }
  }
</style>

<script>
  // Hamburger toggle (inline-safe)
  function toggleAdminMenu() {
    const menu = document.getElementById("adminMobileMenu");
    if (menu) {
      menu.classList.toggle("open");
    }
  }

  // Logout (inline-safe)
  async function logoutUser() {
    await supabase.auth.signOut();
    window.location.href = "../login.html";
  }
</script>
