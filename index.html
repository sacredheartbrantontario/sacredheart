<!DOCTYPE html>
<html>
<head>
  <title>Sacred Heart Parish – Brant, Ontario</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbar"></div>
<script>
  fetch("header.html")
    .then(res => res.text())
    .then(html => document.getElementById("navbar").innerHTML = html);
</script>


<!-- FULL-WIDTH SACRED HEART BANNER -->
<div id="bannerSection"></div>

<!-- PARISH NAME -->
<header class="parish-header">
  <h1>Sacred Heart Parish</h1>
  <h3>Brant, Ontario</h3>
</header>

<!-- CURRENT AFFAIRS -->
<section class="section">
  <h2>Current Affairs</h2>
  <div id="affairsList"></div>
</section>

<!-- PRESENTATIONS -->
<section class="section">
  <h2>Presentations</h2>
  <div id="presentationsList"></div>
</section>

<!-- HOMEPAGE LINKS -->
<section class="section">
  <h2>Quick Links</h2>
  <div id="linksList"></div>
</section>

<!-- HOMEPAGE PHOTOS -->
<section class="section">
  <h2>Parish Photos</h2>
  <div id="photosGallery"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script src="js/homepage.js"></script>



<script>
  const hamburger = document.getElementById("hamburger");
  const navLinks = document.getElementById("navLinks");

  hamburger.addEventListener("click", () => {
    navLinks.style.display =
      navLinks.style.display === "flex" ? "none" : "flex";
  });
</script>

</body>


</html>
