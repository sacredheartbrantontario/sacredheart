  <header class="hero small-hero">
    <h1 class="parish-name">Parish Registration</h1>
    <p class="parish-verse">Welcome to our Sacred Heart community.</p>
  </header>

  <section class="section">
    <form id="register-form" class="card">

      <label>Name</label>
      <input type="text" id="name" required>

      <label>Address</label>
      <input type="text" id="address" required>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Password</label>
      <input type="password" id="password" required>

      <label>Upload File (optional)</label>
      <input type="file" id="file">

      <button type="submit" class="link-button">Register</button>

      <p id="message"></p>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="register_v2.js"></script>
  <script src="nav.js"></script>
